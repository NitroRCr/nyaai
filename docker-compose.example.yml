services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: pass
    command: postgres -c wal_level=logical
    healthcheck:
      test: pg_isready
      interval: 5s
    volumes:
      - pgdata:/var/lib/postgresql
      - ./initdb.d:/docker-entrypoint-initdb.d

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URLS="postgres://postgres:pass@db:5432/app,postgres://postgres:pass@db:5432/zero"
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=transaction
    depends_on:
      - db
    healthcheck:
      test: ['CMD', 'pg_isready', '-h', 'localhost']
      interval: 5s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      SITE_NAME: 'Nya AI'
      FRONT_URL: update-this
      ADMIN_URL: update-this
      BETTER_AUTH_SECRET: update-this
      DATABASE_URL: postgres://postgres:pass@pgbouncer:5432/app
      S3_ACCESS_KEY_ID: update-this
      S3_SECRET_ACCESS_KEY: update-this
      S3_ENDPOINT: update-this
      S3_REGION: update-this
      S3_BUCKET: update-this

    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      SERVER_URL: http://server:3000
      ZERO_CACHE_URL: http://zero-cache:4848
 
  zero-cache:
    image: rocicorp/zero:0.25.13
    environment:
      ZERO_UPSTREAM_DB: postgres://postgres:pass@db:5432/app
      ZERO_CVR_DB: postgres://postgres:pass@pgbouncer:5432/zero
      ZERO_CHANGE_DB: postgres://postgres:pass@pgbouncer:5432/zero
      ZERO_REPLICA_FILE: /data/zero.db
      # Password used to access the inspector and /statz
      ZERO_ADMIN_PASSWORD: pickanewpassword
      ZERO_QUERY_URL: http://server:3000/api/zero/query
      ZERO_MUTATE_URL: http://server:3000/api/zero/mutate
    volumes:
      # Disk for the SQLite replica should be high IOPS
      - zero-cache-data:/data
    depends_on:
      server:
        condition: service_started
    healthcheck:
      test: curl -f http://localhost:4848/keepalive
      interval: 5s

volumes:
  pgdata:
  zero-cache-data: