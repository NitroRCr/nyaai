name: Docker Image CI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Login to DockerHub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyaai-server:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nyaai-server:latest

      - name: Build and push web
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyaai-web:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nyaai-web:latest
